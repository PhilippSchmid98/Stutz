name: Android Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # =================================================================
  # 1. TESTEN (Muss immer zuerst grün sein)
  # =================================================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test

  # =================================================================
  # PFAD A: APK BAUEN (Parallel zu AAB)
  # =================================================================
  build_apk:
    name: 🏗️ Build APK
    needs: test
    if: github.event_name != 'pull_request' # Baut keine APKs bei PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get

      # Secrets decodieren (nur für APK Signierung nötig)
      - name: Decode Keystore & Config
        run: |
          # 1. Keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          
          # 2. Google Services JSON (NEU!)
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
          
          # 3. Key Properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # Nur APK bauen
      - name: Build APK
        run: flutter build apk --release

      # APK speichern
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # =================================================================
  # PFAD B: AAB BAUEN (Parallel zu APK)
  # =================================================================
  build_aab:
    name: 🏗️ Build AAB
    needs: test
    if: github.event_name != 'pull_request' # Baut keine AABs bei PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get

      # Secrets decodieren (Auch hier nötig für AAB Signierung)
      - name: Decode Keystore & Config
        run: |
          # 1. Keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          
          # 2. Google Services JSON (NEU!)
          echo "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
          
          # 3. Key Properties
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      # Nur AAB bauen
      - name: Build AppBundle
        run: flutter build appbundle --release

      # AAB speichern
      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # =================================================================
  # RELEASE APK -> GITHUB (Sobald build_apk fertig ist)
  # =================================================================
  release_github:
    name: 📦 GitHub Release
    needs: build_apk # Wartet NICHT auf AAB!
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: build/android # Wir laden es in diesen Ordner

      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/android/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =================================================================
  # RELEASE AAB -> PLAY STORE (Sobald build_aab fertig ist)
  # =================================================================
  release_play_store:
    name: 🚀 Google Play Upload
    needs: build_aab
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: build/android

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          packageName: ch.stutz.app # <--- DEIN PACKAGE NAME
          releaseFiles: build/android/app-release.aab
          track: internal
          status: draft